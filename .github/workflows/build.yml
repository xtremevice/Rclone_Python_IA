name: Build Rclone Manager

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ------------------------------------------------------------------
  # Tests – run the unit test suite on Linux
  # ------------------------------------------------------------------
  test:
    name: Run Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  # ------------------------------------------------------------------
  # Windows – produces a single .exe file
  # ------------------------------------------------------------------
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate application icon
        run: python assets/generate_icon.py

      - name: Build executable with PyInstaller
        run: |
          pyinstaller build_scripts/rclone_manager_windows.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: RcloneManager-Windows
          path: dist/RcloneManager.exe
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Linux – produces an AppImage
  # ------------------------------------------------------------------
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (tkinter, FUSE for AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libfuse2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download appimagetool
        run: |
          wget -q -O /usr/local/bin/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        run: |
          chmod +x build_scripts/build_linux.sh
          ./build_scripts/build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: RcloneManager-Linux
          path: dist/RcloneManager-x86_64.AppImage
          if-no-files-found: error

  # ------------------------------------------------------------------
  # macOS – produces a single executable / .app bundle
  # ------------------------------------------------------------------
  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          chmod +x build_scripts/build_mac.sh
          ./build_scripts/build_mac.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: RcloneManager-macOS
          path: dist/RcloneManager
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Release – upload artifacts to GitHub Release when a tag is pushed
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [ build-windows, build-linux, build-macos ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/RcloneManager-Windows/RcloneManager.exe
            artifacts/RcloneManager-Linux/RcloneManager-x86_64.AppImage
            artifacts/RcloneManager-macOS/RcloneManager
          generate_release_notes: true
          draft: false
          prerelease: false
