name: Build Rclone Manager

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

# Central Python version used across all jobs
env:
  PYTHON_VERSION: "3.12"

jobs:
  # ------------------------------------------------------------------
  # Tests – run the unit test suite on Linux
  # ------------------------------------------------------------------
  test:
    name: Run Tests (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pystray pytest

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  # ------------------------------------------------------------------
  # Windows – produces a single .exe file
  # ------------------------------------------------------------------
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pystray pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller build/rclone_manager.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: RcloneManager-Windows
          path: dist/windows/RcloneManager.exe
          if-no-files-found: warn

  # ------------------------------------------------------------------
  # Linux – produces an AppImage
  # ------------------------------------------------------------------
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies (tkinter, FUSE for AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libfuse2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pystray pyinstaller

      - name: Download appimagetool
        run: |
          wget -q -O /usr/local/bin/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Build AppImage
        env:
          # appimagetool is itself an AppImage; this env var lets it run
          # without FUSE (required on GitHub Actions runners).
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          chmod +x build/build_linux.sh
          ./build/build_linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: RcloneManager-Linux
          path: dist/linux/RcloneManager-x86_64.AppImage
          if-no-files-found: warn

  # ------------------------------------------------------------------
  # macOS Intel (x86_64) – produces a .app bundle for Intel Macs
  # ------------------------------------------------------------------
  build-macos-intel:
    name: Build macOS app (Intel x86_64)
    runs-on: macos-13
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pystray pyinstaller

      - name: Build macOS app (Intel)
        run: |
          chmod +x build/build_mac.sh
          ./build/build_mac.sh

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: RcloneManager-macOS-Intel
          path: dist/mac/RcloneManager.app
          if-no-files-found: warn

  # ------------------------------------------------------------------
  # macOS Apple Silicon (arm64) – produces a .app bundle for M1/M2/M3
  # ------------------------------------------------------------------
  build-macos-arm64:
    name: Build macOS app (Apple Silicon arm64)
    runs-on: macos-14
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow pystray pyinstaller

      - name: Build macOS app (Apple Silicon)
        run: |
          chmod +x build/build_mac.sh
          ./build/build_mac.sh

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: RcloneManager-macOS-Apple-Silicon
          path: dist/mac/RcloneManager.app
          if-no-files-found: warn

  # ------------------------------------------------------------------
  # Release – upload artifacts to GitHub Release when a tag is pushed
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [ build-windows, build-linux, build-macos-intel, build-macos-arm64 ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package macOS Intel app bundle
        run: |
          cd artifacts/RcloneManager-macOS-Intel
          zip -r ../RcloneManager-macOS-Intel.zip RcloneManager.app

      - name: Package macOS Apple Silicon app bundle
        run: |
          cd artifacts/RcloneManager-macOS-Apple-Silicon
          zip -r ../RcloneManager-macOS-Apple-Silicon.zip RcloneManager.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/RcloneManager-Windows/RcloneManager.exe
            artifacts/RcloneManager-Linux/RcloneManager-x86_64.AppImage
            artifacts/RcloneManager-macOS-Intel.zip
            artifacts/RcloneManager-macOS-Apple-Silicon.zip
          generate_release_notes: true
          draft: false
          prerelease: false
